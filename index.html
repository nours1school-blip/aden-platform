<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>سفراء الزمن</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Tajawal'}
body{margin:0;background:#eef5ff}

/* NAV */
.navbar{
position:fixed;top:0;width:100%;
background:#0077be;color:#fff;
display:flex;justify-content:space-between;
padding:12px 20px;z-index:1000;
}
.navbar a{color:#fff;text-decoration:none;margin:0 10px}

/* HERO */
.hero{height:100vh;background:#0077be;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column}

/* SECTIONS */
.section{padding:90px 20px;text-align:center}

/* BUTTON */
.btn{
background:#0077be;color:#fff;border:none;
padding:12px 20px;border-radius:20px;cursor:pointer
}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;border-radius:15px;overflow:hidden}
.card img{width:100%;height:180px;object-fit:cover}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:15px;width:90%;max-width:400px}

/* INPUT */
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd}

/* RATING */
.rating span{font-size:25px;cursor:pointer}
.rating .active{color:gold}

/* MESSAGE */
.msg{padding:10px;border-radius:10px;margin-top:10px;display:none}
.success{background:#e6f7ec;color:#146c2e}
.error{background:#fdecec;color:#b42318}
</style>
</head>

<body>

<nav class="navbar">
<div>عدن</div>
<div>
<a href="#exp">تجارب</a>
<a href="#survey">تقييم</a>
</div>
</nav>

<section class="hero">
<h1>اكتشف عدن</h1>
<button onclick="scrollToExp()" class="btn">ابدأ</button>
</section>

<section id="exp" class="section">
<h2>شارك تجربتك</h2>
<button id="openBtn" class="btn">إضافة تجربة</button>

<div id="gallery" class="gallery"></div>

<p id="expMsg" class="msg success"></p>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<form id="form">
<input id="name" placeholder="اسمك" required>
<input id="place" placeholder="المكان" required>

<div id="uploadBox" style="border:2px dashed #0077be;padding:15px;cursor:pointer">
اختر صورة
</div>
<input type="file" id="file" hidden>

<img id="preview" style="width:100%;display:none">

<textarea id="comment" placeholder="تعليقك" required></textarea>

<button class="btn">نشر</button>
</form>

</div>
</div>

<!-- SURVEY -->
<section id="survey" class="section">
<h2>قيم المشروع</h2>

<form id="surveyForm">
<input name="name" placeholder="اسمك" required>

<div class="rating">
<span data-rate="1">⭐</span>
<span data-rate="2">⭐</span>
<span data-rate="3">⭐</span>
<span data-rate="4">⭐</span>
<span data-rate="5">⭐</span>
</div>

<input type="hidden" id="ratingValue" name="rating">

<textarea name="msg" placeholder="رأيك" required></textarea>

<button class="btn">إرسال</button>

<p id="surveyMsg" class="msg success"></p>
</form>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

/* ===== Supabase ===== */
const supabase = window.supabase.createClient(
"https://txqqfiphdsuedwcrvjjs.supabase.co",
"YOUR_KEY"
);

/* ===== Elements ===== */
const modal=document.getElementById("modal");
const openBtn=document.getElementById("openBtn");
const form=document.getElementById("form");
const gallery=document.getElementById("gallery");
const fileInput=document.getElementById("file");
const uploadBox=document.getElementById("uploadBox");
const preview=document.getElementById("preview");

const expMsg=document.getElementById("expMsg");
const surveyMsg=document.getElementById("surveyMsg");

let imageFile=null;

/* MODAL */
openBtn.onclick=()=>modal.style.display="flex";
modal.onclick=e=>{if(e.target===modal)modal.style.display="none"};

/* IMAGE */
uploadBox.onclick=()=>fileInput.click();
fileInput.onchange=()=>{
imageFile=fileInput.files[0];
preview.src=URL.createObjectURL(imageFile);
preview.style.display="block";
};

/* CARD */
function addCard(n,p,c,img){
gallery.innerHTML+=`
<div class="card">
<img src="${img}">
<h4>${p}</h4>
<p>${c}</p>
<small>${n}</small>
</div>`;
}

/* SUBMIT EXPERIENCE */
form.onsubmit=async(e)=>{
e.preventDefault();

const name=document.getElementById("name").value;
const place=document.getElementById("place").value;
const comment=document.getElementById("comment").value;

if(!imageFile) return alert("ارفع صورة");

const fileName=Date.now()+"-"+imageFile.name;

await supabase.storage.from("experiences").upload(fileName,imageFile);
const {data}=supabase.storage.from("experiences").getPublicUrl(fileName);

await supabase.from("experiences").insert([{
user_name:name,
place,
comment,
image_url:data.publicUrl
}]);

addCard(name,place,comment,data.publicUrl);

form.reset();
preview.style.display="none";
modal.style.display="none";

expMsg.innerText="تم نشر تجربتك بنجاح 🎉";
expMsg.style.display="block";
};

/* LOAD */
async function loadData(){
const {data}=await supabase.from("experiences").select("*");
data.forEach(d=>addCard(d.user_name,d.place,d.comment,d.image_url));
}
loadData();

/* ===== RATING ===== */
const stars=document.querySelectorAll(".rating span");
const ratingValue=document.getElementById("ratingValue");

stars.forEach(star=>{
star.onclick=()=>{
stars.forEach(s=>s.classList.remove("active"));
star.classList.add("active");
ratingValue.value=star.dataset.rate;
};
});

/* ===== SURVEY ===== */
document.getElementById("surveyForm").onsubmit=async(e)=>{
e.preventDefault();

if(!ratingValue.value){
alert("اختر تقييم");
return;
}

const formData=new FormData(e.target);

const res=await fetch("https://formspree.io/f/xaqajwvd",{
method:"POST",
body:formData,
headers:{Accept:"application/json"}
});

if(res.ok){
surveyMsg.innerText="تم إرسال رأيك بنجاح ✅";
surveyMsg.style.display="block";
e.target.reset();
}else{
alert("خطأ");
}
};

});

/* SCROLL */
function scrollToExp(){
document.getElementById("exp").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
