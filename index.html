<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفراء الزمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Cairo;background:#f5f7fb;margin:0;padding:20px}
.container{max-width:900px;margin:auto}

.btn{background:#0b5ed7;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}

.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.card img{width:100%;height:200px;object-fit:cover}
.card div{padding:10px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:400px}

input,textarea,select{width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>

<div class="container">

<h2>تجارب الزوار</h2>

<button class="btn" onclick="openModal()">شارك تجربتك</button>

<div id="gallery" class="grid"></div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">

    <span onclick="closeModal()" style="cursor:pointer">❌</span>

    <h3>مشاركة تجربة</h3>

    <form id="form">

      <input type="text" id="name" placeholder="اسمك" required>
      <input type="text" id="place" placeholder="المكان" required>

      <input type="file" id="file" accept="image/*" required>

      <select id="rating" required>
        <option value="">التقييم</option>
        <option>⭐</option>
        <option>⭐⭐</option>
        <option>⭐⭐⭐</option>
        <option>⭐⭐⭐⭐</option>
        <option>⭐⭐⭐⭐⭐</option>
      </select>

      <textarea id="comment" placeholder="اكتب تجربتك..." required></textarea>

      <button class="btn" type="submit" id="submitBtn">نشر</button>

    </form>

  </div>
</div>

<script>

/* =========================
   إعداد Supabase
========================= */
const SUPABASE_URL = "https://txqqfiphdsuedwcrvjjs.supabase.co";
const SUPABASE_KEY = "PUT_YOUR_NEW_KEY_HERE"; // 🔥 استبدلها بمفتاح جديد

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   Modal
========================= */
function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* =========================
   Submit
========================= */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "جاري الرفع...";

  const name = document.getElementById("name").value;
  const place = document.getElementById("place").value;
  const comment = document.getElementById("comment").value;
  const rating = document.getElementById("rating").value;
  const file = document.getElementById("file").files[0];

  try{

    if(!file) throw new Error("اختر صورة");

    const fileName = Date.now() + "-" + file.name;

    const { error: uploadError } = await client.storage
      .from("experiences")
      .upload(fileName, file);

    if(uploadError) throw uploadError;

    const { data } = client.storage
      .from("experiences")
      .getPublicUrl(fileName);

    const image_url = data.publicUrl;

    const { error: dbError } = await client
      .from("experiences")
      .insert([{
        user_name: name,
        place,
        rating,
        comment,
        image_url
      }]);

    if(dbError) throw dbError;

    addCard(name, place, comment, rating, image_url);

    alert("✅ تم النشر");

    document.getElementById("form").reset();
    closeModal();

  }catch(err){
    console.error(err);
    alert("❌ " + err.message);
  }

  btn.disabled = false;
  btn.innerText = "نشر";
});

/* =========================
   UI
========================= */
function addCard(name, place, comment, rating, image){
  const card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
    <img src="${image}">
    <div>
      <h4>${place}</h4>
      <p>${comment}</p>
      <div>${rating}</div>
      <span>— ${name}</span>
    </div>
  `;

  document.getElementById("gallery").prepend(card);
}

/* =========================
   Load Data
========================= */
async function loadData(){
  const { data } = await client
    .from("experiences")
    .select("*")
    .order("id", { ascending:false });

  if(!data) return;

  data.forEach(item=>{
    addCard(
      item.user_name,
      item.place,
      item.comment,
      item.rating,
      item.image_url
    );
  });
}

loadData();

</script>

</body>
</html>
