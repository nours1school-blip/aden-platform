<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفراء الزمن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Uploadcare -->
<script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

<style>
  body { font-family: 'Cairo', sans-serif; background: #f5f7fb; margin: 0; padding: 20px; }
  .container { max-width: 800px; margin: auto; }
  .btn { background: #0b5ed7; color: #fff; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  .form-group { margin: 15px 0; }
  .form-label { display: block; margin-bottom: 5px; font-weight: 600; }
  .form-control { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-content { background: #fff; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
  .alert { padding: 12px; border-radius: 8px; margin: 10px 0; }
  .alert-success { background: #d1e7dd; color: #0f5132; }
  .alert-error { background: #f8d7da; color: #842029; }
</style>
</head>
<body>

<div class="container">
  <h1 style="text-align:center">🕰️ سفراء الزمن</h1>
  <div style="text-align:center; margin: 30px 0;">
    <button class="btn" onclick="openModal()">📤 شارك تجربتك</button>
  </div>
  <div id="gallery"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>مشاركة تجربة جديدة</h2>
    <form id="form" name="visitor-feedback" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="visitor-feedback">
      
      <div class="form-group">
        <label class="form-label">الاسم *</label>
        <input type="text" name="user_name" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">المكان *</label>
        <input type="text" name="place" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">الصورة *</label>
        <!-- ✅ المفتاح مضاف مباشرة -->
        <input type="hidden" 
               role="uploadcare-uploader"
               data-public-key="492ad76c8d4cd40b9428"
               data-images-only
               data-clearable
               required>
        <div id="uploadStatus"></div>
      </div>
      
      <div class="form-group">
        <label class="form-label">التقييم *</label>
        <select name="rating" class="form-control" required>
          <option value="">اختر...</option>
          <option value="⭐">⭐</option>
          <option value="⭐⭐">⭐⭐</option>
          <option value="⭐⭐⭐">⭐⭐⭐</option>
          <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
          <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">التعليق *</label>
        <textarea name="comment" class="form-control" rows="4" required></textarea>
      </div>
      
      <div id="alertBox"></div>
      
      <button type="submit" class="btn" style="width:100%">🚀 نشر</button>
    </form>
    <button onclick="closeModal()" style="margin-top:15px; background:#6c757d; color:#fff; padding:8px 16px; border:none; border-radius:6px; cursor:pointer">إغلاق</button>
  </div>
</div>

<script>
let uploadedImageUrl = null;

function openModal() {
  document.getElementById('modal').classList.add('show');
  // تهيئة Uploadcare عند فتح النافذة
  setTimeout(() => {
    const input = document.querySelector('[role="uploadcare-uploader"]');
    if (input && window.uploadcare) {
      const widget = uploadcare.Widget(input);
      widget.onChange((file) => {
        if (file) {
          document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-success">📤 جاري الرفع...</div>';
          file.done((info) => {
            uploadedImageUrl = info.cdnUrl;
            document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-success">✅ تم رفع الصورة!</div>';
            console.log('✅ Uploaded:', info.cdnUrl);
          });
          file.fail((err) => {
            uploadedImageUrl = null;
            document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-error">❌ فشل الرفع: ' + (err.message || err.errorCode) + '</div>';
            console.error('❌ Upload failed:', err);
          });
        }
      });
    }
  }, 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  if (!uploadedImageUrl) {
    alert('⚠️ يرجى رفع صورة أولاً');
    return;
  }
  
  const formData = new FormData(e.target);
  formData.append('image', uploadedImageUrl);
  
  try {
    const res = await fetch('/', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams(formData)
    });
    
    if (res.ok) {
      alert('✅ تم النشر بنجاح!');
      closeModal();
      e.target.reset();
      uploadedImageUrl = null;
    } else {
      alert('❌ فشل الإرسال');
    }
  } catch (err) {
    console.error(err);
    alert('❌ خطأ في الاتصال');
  }
});

// إغلاق النافذة عند النقر خارجها
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});
</script>

</body>
</html>
