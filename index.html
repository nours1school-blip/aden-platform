<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>سفراء الزمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Tajawal&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
*{box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{margin:0;background:linear-gradient(135deg,#e9f2ff,#f7fbff)}

/* ===== NAVBAR ===== */
.navbar{
position:fixed;top:0;width:100%;
background:#0077be;color:#fff;
display:flex;justify-content:space-between;
padding:12px 25px;z-index:1000;
}
.navbar ul{display:flex;gap:15px;list-style:none}
.navbar a{color:#fff;text-decoration:none;font-weight:bold}

/* ===== HERO ===== */
.hero{height:100vh;background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover}
.hero-overlay{
background:rgba(0,0,0,.6);
height:100%;display:flex;
flex-direction:column;justify-content:center;align-items:center;
color:#fff;text-align:center;
}
.btn-primary{background:#f4a460;padding:12px 28px;border-radius:10px}

/* ===== SECTIONS ===== */
.section{padding:90px 20px}
.section-title{text-align:center;color:#0077be;font-size:28px}

/* ===== EXPERIENCES ===== */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;max-width:1100px;margin:30px auto;
}
.gallery-card{
background:#fff;border-radius:15px;
overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.1);
}
.gallery-card img{width:100%;height:200px;object-fit:cover}
.card-content{text-align:center;padding:10px}

/* ===== BUTTON ===== */
.primary-btn{
background:#0077be;color:#fff;
border:none;padding:12px 25px;
border-radius:25px;cursor:pointer;
display:block;margin:20px auto;
}

/* ===== MODAL ===== */
.modal{
display:none;position:fixed;
inset:0;background:rgba(0,0,0,.6);
align-items:center;justify-content:center;
}
.modal-content{
background:#fff;padding:20px;border-radius:15px;
width:90%;max-width:400px;
}

/* ===== UPLOAD BOX ===== */
#uploadBox{
margin-top:10px;
padding:20px;
border:2px dashed #0077be;
border-radius:12px;
text-align:center;
cursor:pointer;
background:#f7fbff;
transition:.2s;
}
#uploadBox:hover{background:#e6f2ff}
#preview{
width:100%;margin-top:10px;
border-radius:10px;display:none;
}

/* ===== NEARBY ===== */
.nearby-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;max-width:1100px;margin:auto;
}
.nearby-item{
background:#fff;border-radius:16px;
overflow:hidden;text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}
.nearby-item img{width:100%;height:160px;object-fit:cover}

/* ===== SURVEY ===== */
.survey-form{
max-width:500px;margin:40px auto;
background:#fff;padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
display:flex;flex-direction:column;gap:10px;
}
.survey-form input,.survey-form textarea{
padding:10px;border-radius:10px;border:1px solid #ddd;
}

/* ===== FOOTER ===== */
#footer{
background:#0b3c5d;color:#fff;
text-align:center;padding:30px;
}
.social{
display:flex;justify-content:center;
gap:20px;margin-top:10px;
font-size:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<h2>عدن</h2>
<ul>
<li><a href="#home">الرئيسية</a></li>
<li><a href="#exp">شارك تجربتك</a></li>
<li><a href="#nearby">أماكن قريبة</a></li>
<li><a href="#survey">استبيان</a></li>
</ul>
</nav>

<!-- HERO -->
<section id="home" class="hero">
<div class="hero-overlay">
<h1>اكتشف سحر عدن</h1>
<p>مدينة البحر والتاريخ</p>
<a href="#exp" class="btn-primary">ابدأ</a>
</div>
</section>

<!-- EXPERIENCES -->
<section id="exp" class="section">
<h2 class="section-title">شارك تجربتك</h2>

<button class="primary-btn" onclick="openModal()">إضافة تجربة</button>

<div id="gallery" class="gallery"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h3 style="text-align:center"> شاركنا تجربتك </h3>

<form id="form">
<input type="text" id="name" placeholder="اسمك" required>
<input type="text" id="place" placeholder="المكان" required>

<div id="uploadBox">اضغط أو اسحب صورة هنا</div>
<input type="file" id="file" accept="image/*" hidden>

<img id="preview">

<textarea id="comment" placeholder="تعليقك" required></textarea>
<button class="primary-btn" id="openBtn">إضافة تجربة</button>
</form>

</div>
</div>

<!-- NEARBY -->
<section id="nearby" class="section">
<h2 class="section-title">أماكن قريبة</h2>

<div class="nearby-grid">
<div class="nearby-item">
<img src="https://source.unsplash.com/400x300/?park">
<p>حديقة عدن</p>
</div>
<div class="nearby-item">
<img src="https://source.unsplash.com/400x300/?mall">
<p> عدن مول</p>
</div>
</div>
</section>

<!-- SURVEY -->
<section id="survey" class="section">
<h2 class="section-title">استبيان</h2>

<form class="survey-form" action="https://formspree.io/f/xaqajwvd" method="POST">
<input type="text" name="name" placeholder="اسمك">
<textarea name="msg" placeholder="رأيك"></textarea>
<button class="primary-btn">إرسال</button>
</form>
</section>

<!-- FOOTER -->
<footer id="footer">
<p>© 2026 سفراء الزمن</p>
<div class="social">
<i class="fab fa-facebook"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-twitter"></i>
</div>
</footer>

  <!-- أهم تعديل: إصلاح رفع الصورة + تحسين UX -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
  "https://txqqfiphdsuedwcrvjjs.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4cXFmaXBoZHN1ZWR3Y3J2ampzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTIzOTQsImV4cCI6MjA5MjE2ODM5NH0.csgtDlFliEZzNgntm3IT99IEOXFjHTV3xqFP_3DJNWc"
);

/* عناصر */
const fileInput = document.getElementById("file");
const uploadBox = document.getElementById("uploadBox");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const modal = document.getElementById("modal");
const gallery = document.getElementById("gallery");

let imageFile = null;

/* ===== Modal ===== */
function openModal(){
  modal.style.display="flex";
}

modal.onclick = (e)=>{
  if(e.target === modal){
    modal.style.display="none";
  }
};

/* ===== رفع الصورة ===== */
uploadBox.onclick = ()=> fileInput.click();

fileInput.addEventListener("change", ()=>{
  imageFile = fileInput.files[0];

  if(!imageFile) return;

  preview.src = URL.createObjectURL(imageFile);
  preview.style.display="block";
});

/* ===== إضافة كرت ===== */
function addCard(name, place, comment, image){
  const card = document.createElement("div");
  card.className="gallery-card";

  card.innerHTML = `
    <img src="${image}">
    <div class="card-content">
      <h4>${place}</h4>
      <p>${comment}</p>
      <span>${name}</span>
    </div>
  `;

  gallery.prepend(card);
}

/* ===== إرسال ===== */
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const place = document.getElementById("place").value.trim();
  const comment = document.getElementById("comment").value.trim();

  if(!name || !place || !comment){
    alert("أكمل البيانات");
    return;
  }

  if(!imageFile){
    alert("ارفع صورة");
    return;
  }

  try{

    /* رفع الصورة */
    const fileName = Date.now()+"-"+imageFile.name;

    const { error: uploadError } = await supabase
      .storage
      .from("experiences")
      .upload(fileName, imageFile);

    if(uploadError) throw uploadError;

    const { data } = supabase
      .storage
      .from("experiences")
      .getPublicUrl(fileName);

    const image_url = data.publicUrl;

    /* حفظ DB */
    const { error: dbError } = await supabase
      .from("experiences")
      .insert([{
        user_name: name,
        place,
        comment,
        image_url
      }]);

    if(dbError) throw dbError;

    addCard(name, place, comment, image_url);

    form.reset();
    preview.style.display="none";
    imageFile = null;
    modal.style.display="none";

    alert("تم النشر ✅");

  }catch(err){
    console.error(err);
    alert("خطأ: "+err.message);
  }

});

/* ===== تحميل البيانات ===== */
async function loadData(){
  const { data, error } = await supabase
    .from("experiences")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    return;
  }

  data.forEach(item=>{
    addCard(
      item.user_name,
      item.place,
      item.comment,
      item.image_url
    );
  });
}

loadData();

</script>

</body>
</html>
