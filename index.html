<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفراء الزمن - مشاركة التجارب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- ✅ Supabase JS Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --primary: #0b5ed7;
    --primary-dark: #0a4db3;
    --success: #198754;
    --danger: #dc3545;
    --warning: #ffc107;
    --light: #f8f9fa;
    --dark: #1a1a2e;
    --gray: #6c757d;
    --shadow: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 16px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #f5f7fb 0%, #e4e8f0 100%);
    color: var(--dark);
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px;
  }
  
  .container { max-width: 1000px; margin: auto; }
  
  .header {
    text-align: center;
    padding: 30px 0;
  }
  .header h1 {
    color: var(--primary);
    font-size: 2rem;
    margin-bottom: 10px;
  }
  .header p { color: var(--gray); }
  
  .btn {
    background: var(--primary);
    color: #fff;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
  .btn:disabled { 
    background: var(--gray); 
    cursor: not-allowed; 
    transform: none;
    opacity: 0.7;
  }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }
  
  .card {
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.18);
  }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    background: #f1f3f5;
  }
  .card-body { padding: 18px; }
  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-text { color: #555; font-size: 0.95rem; margin: 6px 0; line-height: 1.5; }
  .card-rating { font-size: 1.4rem; margin: 8px 0; }
  .card-author {
    display: block;
    margin-top: 12px;
    color: var(--primary);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .card-date {
    font-size: 0.8rem;
    color: var(--gray);
    margin-top: 4px;
    display: block;
  }
  
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeOverlay 0.2s ease;
  }
  @keyframes fadeOverlay {
    from { opacity: 0; } to { opacity: 1; }
  }
  .modal.show { display: flex; }
  
  .modal-content {
    background: #fff;
    padding: 28px;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: slideUp 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  .modal-close {
    position: absolute;
    left: 20px;
    top: 18px;
    font-size: 1.6rem;
    cursor: pointer;
    color: var(--gray);
    transition: color 0.2s;
    background: none;
    border: none;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .modal-close:hover { color: var(--danger); background: #ffebee; }
  
  .modal-title {
    font-size: 1.4rem;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #eee;
    color: var(--dark);
  }
  
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--dark);
  }
  .form-label .required { color: var(--danger); margin-right: 3px; }
  
  .form-control {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e4ec;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fff;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(11,94,215,0.15);
  }
  
  .form-text {
    font-size: 0.85rem;
    color: var(--gray);
    margin-top: 6px;
  }
  
  textarea.form-control {
    min-height: 100px;
    resize: vertical;
  }
  
  .upload-area {
    border: 2px dashed var(--primary);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #f8f9fa;
  }
  .upload-area:hover {
    background: #e9ecef;
    border-color: var(--primary-dark);
  }
  .upload-area.has-image {
    border-style: solid;
    border-color: var(--success);
    background: #d1e7dd;
  }
  .upload-area img {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 10px;
  }
  
  .alert {
    padding: 12px 16px;
    border-radius: 12px;
    margin: 15px 0;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .alert-success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
  .alert-error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
  .alert-info { background: #cff4fc; color: #055160; border: 1px solid #b6effb; }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-state svg {
    width: 80px;
    height: 80px;
    margin-bottom: 15px;
    opacity: 0.5;
  }
  
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  @media (max-width: 768px) {
    .header h1 { font-size: 1.5rem; }
    .modal-content { padding: 22px; }
    .grid { grid-template-columns: 1fr; }
  }
  
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #c1c9d6; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a0a8b8; }
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🕰️ سفراء الزمن</h1>
    <p>شاركنا لحظاتك الجميلة واقرأ تجارب الآخرين</p>
  </div>
  
  <div style="text-align: center; margin: 30px 0;">
    <button class="btn" onclick="openModal()">📤 شارك تجربتك الآن</button>
  </div>
  
  <div id="gallery" class="grid">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <p>لا توجد تجارب حتى الآن.<br>كن أول من يشارك!</p>
    </div>
  </div>
</div>

<!-- Modal Form -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()" aria-label="إغلاق">❌</button>
    <h3 class="modal-title">📝 مشاركة تجربة جديدة</h3>
    
    <form id="form">
      <!-- Name Field -->
      <div class="form-group">
        <label class="form-label" for="userName">
          <span class="required">*</span> اسمك الكريم
        </label>
        <input type="text" id="userName" class="form-control" placeholder="أدخل اسمك" required minlength="2" maxlength="50">
      </div>
      
      <!-- Place Field -->
      <div class="form-group">
        <label class="form-label" for="placeName">
          <span class="required">*</span> المكان الذي زرته
        </label>
        <input type="text" id="placeName" class="form-control" placeholder="مثال: متحف القاهرة، جبل النور..." required minlength="3" maxlength="100">
      </div>
      
      <!-- Image Upload Field -->
      <div class="form-group">
        <label class="form-label">
          <span class="required">*</span> أضف صورة لتجربتك
        </label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div id="uploadPlaceholder">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📷</div>
            <div>اضغط لاختيار صورة</div>
            <div style="font-size: 0.85rem; color: var(--gray); margin-top: 5px;">JPG, PNG, WebP (الحد الأقصى 5MB)</div>
          </div>
          <img id="previewImage" style="display: none;" alt="معاينة الصورة">
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none" required>
        <div id="uploadStatus"></div>
      </div>
      
      <!-- Rating Field -->
      <div class="form-group">
        <label class="form-label" for="rating">
          <span class="required">*</span> تقييمك للتجربة
        </label>
        <select id="rating" class="form-control" required>
          <option value="">اختر التقييم ⭐</option>
          <option value="⭐">⭐ - عادي</option>
          <option value="⭐⭐">⭐⭐ - جيد</option>
          <option value="⭐⭐⭐">⭐⭐⭐ - جيد جداً</option>
          <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ - ممتاز</option>
          <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ - استثنائي</option>
        </select>
      </div>
      
      <!-- Comment Field -->
      <div class="form-group">
        <label class="form-label" for="comment">
          <span class="required">*</span> تفاصيل تجربتك
        </label>
        <textarea id="comment" class="form-control" placeholder="اكتب لنا عن تجربتك... ما الذي أعجبك؟ ما النصيحة التي تقدمها للزوار؟" required minlength="20" maxlength="500"></textarea>
        <div class="form-text" style="text-align: left;">
          <span id="charCount">0</span>/500 حرف
        </div>
      </div>
      
      <!-- Alert Container -->
      <div id="alertBox"></div>
      
      <!-- Submit Button -->
      <button type="submit" class="btn" style="width: 100%; margin-top: 10px;" id="submitBtn">
        🚀 نشر التجربة
      </button>
      
      <p style="text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--gray);">
        🔒 بياناتك محمية • الصور تُخزن بشكل آمن
      </p>
    </form>
  </div>
</div>

<!-- ✅ JavaScript with Supabase Integration -->
<script>
// ============================================
// ✅ تهيئة Supabase - مفاتيح مشروعك
// ============================================
const SUPABASE_URL = 'https://txqqfiphdsuedwcrvjjs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_vAl9_2mj6xGgSpROT9nRfA_wFGxIC-R';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// 📦 حالة التطبيق
// ============================================
let selectedFile = null;
let uploadedImageUrl = null;
const BUCKET_NAME = 'experiences';
const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

// ============================================
// 🎭 عناصر التحكم في الواجهة
// ============================================
const elements = {
  modal: document.getElementById('modal'),
  form: document.getElementById('form'),
  gallery: document.getElementById('gallery'),
  emptyState: document.getElementById('emptyState'),
  submitBtn: document.getElementById('submitBtn'),
  alertBox: document.getElementById('alertBox'),
  fileInput: document.getElementById('fileInput'),
  uploadArea: document.getElementById('uploadArea'),
  previewImage: document.getElementById('previewImage'),
  uploadPlaceholder: document.getElementById('uploadPlaceholder'),
  uploadStatus: document.getElementById('uploadStatus'),
  comment: document.getElementById('comment'),
  charCount: document.getElementById('charCount')
};

// ============================================
// 🚀 تهيئة التطبيق
// ============================================
function init() {
  setupEventListeners();
  loadExperiences();
  console.log('✅ تم تهيئة تطبيق سفراء الزمن مع Supabase');
}

// ============================================
// 🎧 إعداد مستمعي الأحداث
// ============================================
function setupEventListeners() {
  // عدّاد الأحرف للتعليق
  elements.comment?.addEventListener('input', (e) => {
    elements.charCount.textContent = e.target.value.length;
    if (e.target.value.length > 480) {
      elements.charCount.style.color = 'var(--warning)';
    } else {
      elements.charCount.style.color = 'inherit';
    }
  });
  
  // اختيار الملف وعرض المعاينة
  elements.fileInput?.addEventListener('change', handleFileSelect);
  
  // إرسال النموذج
  elements.form?.addEventListener('submit', handleFormSubmit);
  
  // إغلاق النافذة عند النقر خارج المحتوى
  elements.modal?.addEventListener('click', (e) => {
    if (e.target === elements.modal) closeModal();
  });
  
  // إغلاق النافذة بمفتاح Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && elements.modal?.classList.contains('show')) {
      closeModal();
    }
  });
}

// ============================================
// 📷 معالجة اختيار الملف
// ============================================
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  // التحقق من الحجم
  if (file.size > MAX_FILE_SIZE) {
    showAlert('❌ حجم الصورة كبير جداً (الحد الأقصى 5 ميجابايت)', 'error');
    elements.fileInput.value = '';
    return;
  }
  
  // التحقق من النوع
  if (!file.type.startsWith('image/')) {
    showAlert('❌ الرجاء اختيار صورة فقط (JPG, PNG, WebP, GIF)', 'error');
    elements.fileInput.value = '';
    return;
  }
  
  selectedFile = file;
  
  // عرض المعاينة
  const reader = new FileReader();
  reader.onload = (event) => {
    elements.previewImage.src = event.target.result;
    elements.previewImage.style.display = 'block';
    elements.uploadPlaceholder.style.display = 'none';
    elements.uploadArea.classList.add('has-image');
  };
  reader.readAsDataURL(file);
  
  showStatus('ℹ️ الصورة جاهزة، سيتم رفعها عند النشر', 'info');
}

// ============================================
// 🚪 فتح/إغلاق النافذة المنبثقة
// ============================================
function openModal() {
  elements.modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('userName')?.focus(), 300);
}

function closeModal() {
  elements.modal.classList.remove('show');
  document.body.style.overflow = '';
  resetForm();
}

// ============================================
// 🎯 معالجة إرسال النموذج
// ============================================
async function handleFormSubmit(e) {
  e.preventDefault();
  
  if (!selectedFile) {
    showAlert('⚠️ يرجى اختيار صورة أولاً', 'error');
    return;
  }
  
  // حالة التحميل
  elements.submitBtn.disabled = true;
  elements.submitBtn.innerHTML = '<span class="spinner"></span> جاري النشر...';
  clearAlert();
  
  try {
    // 1️⃣ رفع الصورة إلى Supabase Storage
    showStatus('📤 جاري رفع الصورة...', 'info');
    
    const fileExt = selectedFile.name.split('.').pop();
    const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
    
    const { data: uploadData, error: uploadError } = await supabase
      .storage
      .from(BUCKET_NAME)
      .upload(fileName, selectedFile, {
        cacheControl: '3600',
        upsert: false
      });
    
    if (uploadError) {
      console.error('Upload error:', uploadError);
      throw new Error('فشل رفع الصورة: ' + uploadError.message);
    }
    
    // 2️⃣ الحصول على الرابط العام للصورة
    const {  { publicUrl } } = supabase
      .storage
      .from(BUCKET_NAME)
      .getPublicUrl(fileName);
    
    uploadedImageUrl = publicUrl;
    console.log('✅ Image uploaded:', publicUrl);
    
    // 3️⃣ حفظ البيانات في قاعدة البيانات
    showStatus('💾 جاري حفظ البيانات...', 'info');
    
    const { error: dbError } = await supabase
      .from('experiences')
      .insert([{
        user_name: document.getElementById('userName').value.trim(),
        place: document.getElementById('placeName').value.trim(),
        rating: document.getElementById('rating').value,
        comment: document.getElementById('comment').value.trim(),
        image_url: uploadedImageUrl,
        created_at: new Date().toISOString()
      }]);
    
    if (dbError) {
      console.error('Database error:', dbError);
      throw new Error('فشل حفظ البيانات: ' + dbError.message);
    }
    
    // 4️⃣ النجاح! ✨
    showAlert('🎉 تم نشر تجربتك بنجاح! شكراً لمشاركتك ✨', 'success');
    
    // إضافة البطاقة فوراً للمعرض
    addCardToGallery({
      user_name: document.getElementById('userName').value,
      place: document.getElementById('placeName').value,
      rating: document.getElementById('rating').value,
      comment: document.getElementById('comment').value,
      image_url: uploadedImageUrl,
      created_at: new Date().toISOString()
    });
    
    // إغلاق النافذة بعد تأخير بسيط
    setTimeout(() => {
      closeModal();
    }, 1500);
    
  } catch (error) {
    console.error('❌ Submission error:', error);
    showAlert('❌ حدث خطأ: ' + error.message, 'error');
  } finally {
    // إعادة حالة الزر
    elements.submitBtn.disabled = false;
    elements.submitBtn.innerHTML = '🚀 نشر التجربة';
  }
}

// ============================================
// 🎴 إضافة بطاقة للمعرض
// ============================================
function addCardToGallery(data) {
  // إخفاء حالة "لا توجد تجارب"
  if (elements.emptyState) {
    elements.emptyState.style.display = 'none';
  }
  
  const card = document.createElement('div');
  card.className = 'card';
  
  card.innerHTML = `
    <img src="${escapeHtml(data.image_url)}" 
         alt="${escapeHtml(data.place)}" 
         loading="lazy"
         onerror="this.src='https://via.placeholder.com/300x200?text=صورة+غير+متوفرة'">
    <div class="card-body">
      <h4 class="card-title">📍 ${escapeHtml(data.place)}</h4>
      <p class="card-text">${escapeHtml(data.comment)}</p>
      <div class="card-rating">${data.rating}</div>
      <span class="card-author">✍️ ${escapeHtml(data.user_name)}</span>
      <small class="card-date">📅 ${new Date(data.created_at).toLocaleDateString('ar-SA')}</small>
    </div>
  `;
  
  // إضافة في بداية المعرض
  if (elements.gallery.firstChild) {
    elements.gallery.insertBefore(card, elements.gallery.firstChild);
  } else {
    elements.gallery.appendChild(card);
  }
}

// ============================================
// 📥 تحميل التجارب من قاعدة البيانات
// ============================================
async function loadExperiences() {
  try {
    console.log('📥 Loading experiences from Supabase...');
    
    const { data, error } = await supabase
      .from('experiences')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);
    
    if (error) {
      console.error('❌ Error loading experiences:', error);
      return;
    }
    
    if (data && data.length > 0) {
      // إخفاء حالة الفراغ
      if (elements.emptyState) {
        elements.emptyState.style.display = 'none';
      }
      
      // إضافة كل تجربة
      data.forEach(exp => addCardToGallery(exp));
      console.log(`✅ Loaded ${data.length} experiences`);
    }
    
  } catch (error) {
    console.error('❌ Error in loadExperiences:', error);
  }
}

// ============================================
// 🔔 نظام التنبيهات
// ============================================
function showAlert(message, type) {
  if (!elements.alertBox) return;
  
  const alertClass = type === 'success' ? 'alert-success' : 
                     type === 'error' ? 'alert-error' : 'alert-info';
  
  elements.alertBox.innerHTML = `
    <div class="alert ${alertClass}" role="alert">
      ${message}
    </div>
  `;
  
  // إخفاء تلقائي بعد 5 ثوانٍ
  setTimeout(() => {
    if (elements.alertBox.firstChild) {
      elements.alertBox.firstChild.style.opacity = '0';
      setTimeout(() => elements.alertBox.innerHTML = '', 300);
    }
  }, 5000);
}

function showStatus(message, type) {
  if (!elements.uploadStatus) return;
  
  const alertClass = type === 'success' ? 'alert-success' : 
                     type === 'error' ? 'alert-error' : 'alert-info';
  
  elements.uploadStatus.innerHTML = `
    <div class="alert ${alertClass}" style="margin: 10px 0 0 0; padding: 8px 12px;">
      ${message}
    </div>
  `;
}

function clearAlert() {
  if (elements.alertBox) elements.alertBox.innerHTML = '';
  if (elements.uploadStatus) elements.uploadStatus.innerHTML = '';
}

// ============================================
// 🔄 إعادة تعيين النموذج
// ============================================
function resetForm() {
  if (elements.form) elements.form.reset();
  
  // إعادة تعيين حالة الرفع
  elements.previewImage.style.display = 'none';
  elements.uploadPlaceholder.style.display = 'block';
  elements.uploadArea.classList.remove('has-image');
  elements.charCount.textContent = '0';
  elements.charCount.style.color = 'inherit';
  
  // مسح المتغيرات
  selectedFile = null;
  uploadedImageUrl = null;
  
  // مسح التنبيهات
  clearAlert();
  
  console.log('🔄 Form reset');
}

// ============================================
// 🔐 حماية من هجمات XSS
// ============================================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================
// 🚀 بدء التطبيق
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  // اختبار الاتصال بـ Supabase
  supabase
    .from('experiences')
    .select('count', { count: 'exact', head: true })
    .then(({ error }) => {
      if (error) {
        console.error('❌ Supabase connection failed:', error);
        showAlert('⚠️ مشكلة في الاتصال بقاعدة البيانات', 'error');
      } else {
        console.log('✅ Connected to Supabase successfully');
      }
    });
  
  // تهيئة التطبيق
  init();
});
</script>
