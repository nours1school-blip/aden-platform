<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفراء الزمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Cairo;background:#f5f7fb;margin:0;padding:20px}
.container{max-width:1000px;margin:auto}

h2{text-align:center}

.btn{
background:#0b5ed7;
color:#fff;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card div{padding:15px}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

input,textarea,select{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🌍 تجارب الزوار</h2>

<button class="btn" onclick="openModal()">➕ شارك تجربتك</button>

<div id="gallery" class="grid"></div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span onclick="closeModal()" style="cursor:pointer">❌</span>

    <h3>مشاركة تجربة</h3>

    <form id="form">

      <input type="text" id="name" placeholder="اسمك" required>
      <input type="text" id="place" placeholder="المكان" required>

      <input type="file" id="file" accept="image/*" required>
      <img id="preview" class="preview">

      <select id="rating" required>
        <option value="">التقييم</option>
        <option>⭐</option>
        <option>⭐⭐</option>
        <option>⭐⭐⭐</option>
        <option>⭐⭐⭐⭐</option>
        <option>⭐⭐⭐⭐⭐</option>
      </select>

      <textarea id="comment" placeholder="اكتب تجربتك..." required></textarea>

      <button class="btn" type="submit" id="submitBtn">نشر</button>

    </form>

  </div>
</div>

<script>

/* =========================
   إعداد Supabase
========================= */
const SUPABASE_URL = "https://txqqfiphdsuedwcrvjjs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4cXFmaXBoZHN1ZWR3Y3J2ampzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTIzOTQsImV4cCI6MjA5MjE2ODM5NH0.csgtDlFliEZzNgntm3IT99IEOXFjHTV3xqFP_3DJNWc";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   Modal
========================= */
function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* =========================
   Preview Image
========================= */
document.getElementById("file").addEventListener("change",(e)=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ()=>{
    const img = document.getElementById("preview");
    img.src = reader.result;
    img.style.display="block";
  }

  reader.readAsDataURL(file);
});

/* =========================
   Submit
========================= */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "جاري النشر...";

  try{

    const name = document.getElementById("name").value;
    const place = document.getElementById("place").value;
    const comment = document.getElementById("comment").value;
    const rating = document.getElementById("rating").value;
    const file = document.getElementById("file").files[0];

    const fileName = Date.now()+"-"+file.name;

    const { error: uploadError } = await client.storage
      .from("experiences")
      .upload(fileName, file);

    if(uploadError) throw uploadError;

    const { data } = client.storage
      .from("experiences")
      .getPublicUrl(fileName);

    const image_url = data.publicUrl;

    const { error: dbError } = await client
      .from("experiences")
      .insert([{
        user_name: name,
        place,
        rating,
        comment,
        image_url
      }]);

    if(dbError) throw dbError;

    addCard(name, place, comment, rating, image_url);

    alert("✅ تم النشر بنجاح");

    document.getElementById("form").reset();
    document.getElementById("preview").style.display="none";

    closeModal();

  }catch(err){
    console.error(err);
    alert("❌ " + err.message);
  }

  btn.disabled = false;
  btn.innerText = "نشر";
});

/* =========================
   UI
========================= */
function addCard(name, place, comment, rating, image){
  const card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
    <img src="${image}">
    <div>
      <h4>${place}</h4>
      <p>${comment}</p>
      <div>${rating}</div>
      <span>— ${name}</span>
    </div>
  `;

  document.getElementById("gallery").prepend(card);
}

/* =========================
   Load Data
========================= */
async function loadData(){
  const { data } = await client
    .from("experiences")
    .select("*")
    .order("id", { ascending:false });

  if(!data) return;

  data.forEach(item=>{
    addCard(
      item.user_name,
      item.place,
      item.comment,
      item.rating,
      item.image_url
    );
  });
}

loadData();

</script>

</body>
</html>
