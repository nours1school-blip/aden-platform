<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>واجهة محسّنة</title>

<!-- ================= CSS ================= -->
<style>

:root {
  --primary: #4CAF50;
  --primary-dark: #43a047;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --text: #333;
  --border: #e0e0e0;
  --error: #e53935;
  --success: #43a047;
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Cairo", sans-serif;
}

/* Body */
body {
  background: var(--bg);
  padding: 20px;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Card */
.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

/* Titles */
.section-title {
  font-size: 20px;
  margin-bottom: 15px;
  color: var(--text);
  border-right: 4px solid var(--primary);
  padding-right: 10px;
}

/* Form */
.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  color: #555;
}

/* Inputs */
input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 14px;
  transition: 0.3s;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
  outline: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* Messages */
.message {
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

.message.success {
  background: #e8f5e9;
  color: var(--success);
}

.message.error {
  background: #ffebee;
  color: var(--error);
}

/* Image Preview Scroll */
.preview-container {
  max-height: 250px;
  overflow-y: auto;
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 10px;
}

.preview-container img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* Nearby Places */
.places-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.place-card {
  background: var(--card-bg);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.place-card:hover {
  transform: translateY(-5px);
}

.place-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.place-content {
  padding: 12px;
}

.place-title {
  font-size: 16px;
  margin-bottom: 5px;
}

.place-desc {
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
}

.place-btn {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  text-decoration: none;
}

.place-btn:hover {
  background: var(--primary-dark);
}

/* Responsive */
@media (max-width: 600px) {
  .container {
    padding: 0;
  }

  .card {
    padding: 15px;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- ===== FORM ===== -->
  <div class="card">
    <div class="section-title">نموذج الإدخال</div>

    <div class="form-group">
      <label>الاسم</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>الوصف</label>
      <textarea rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>الصورة</label>
      <input type="file">
    </div>

    <button>إرسال</button>

    <div class="message success">تم الإرسال بنجاح</div>
    <div class="message error">حدث خطأ</div>
  </div>

  <!-- ===== IMAGE PREVIEW ===== -->
  <div class="card">
    <div class="section-title">معاينة الصور</div>

    <div class="preview-container">
      <img src="https://via.placeholder.com/400x200">
      <img src="https://via.placeholder.com/400x200">
    </div>
  </div>

  <!-- ===== NEARBY PLACES ===== -->
  <div class="card">
    <div class="section-title">الأماكن القريبة</div>

    <div class="places-grid">

      <div class="place-card">
        <img src="https://via.placeholder.com/300x200">
        <div class="place-content">
          <div class="place-title">مطعم مميز</div>
          <div class="place-desc">وصف قصير عن المكان بشكل جذاب</div>
          <a href="#" class="place-btn">عرض</a>
        </div>
      </div>

      <div class="place-card">
        <img src="https://via.placeholder.com/300x200">
        <div class="place-content">
          <div class="place-title">مقهى جميل</div>
          <div class="place-desc">مكان هادئ ومناسب للعمل</div>
          <a href="#" class="place-btn">تفاصيل</a>
        </div>
      </div>

      <div class="place-card">
        <img src="https://via.placeholder.com/300x200">
        <div class="place-content">
          <div class="place-title">حديقة عامة</div>
          <div class="place-desc">مساحة خضراء للاسترخاء</div>
          <a href="#" class="place-btn">عرض</a>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
