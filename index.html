<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>سفراء الزمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Tajawal&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{margin:0;background:linear-gradient(135deg,#e9f2ff,#f7fbff)}

.navbar{
position:fixed;top:0;width:100%;
background:#0077be;color:#fff;
display:flex;justify-content:space-between;
padding:12px 25px;z-index:1000;
}
.navbar ul{display:flex;gap:15px;list-style:none}
.navbar a{color:#fff;text-decoration:none;font-weight:bold}

.hero{height:100vh;background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover}
.hero-overlay{
background:rgba(0,0,0,.6);
height:100%;display:flex;
justify-content:center;align-items:center;
color:#fff;text-align:center;
flex-direction:column;
}
.btn-primary{background:#f4a460;padding:12px 28px;border-radius:10px;border:none}

.section{padding:90px 20px}
.section-title{text-align:center;color:#0077be;font-size:28px}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;max-width:1100px;margin:auto;
}

.gallery-card{
background:#fff;border-radius:15px;
overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.1);
}
.gallery-card img{width:100%;height:200px;object-fit:cover}
.card-content{text-align:center;padding:10px}

.primary-btn{
background:#0077be;color:#fff;
border:none;padding:12px 25px;
border-radius:25px;cursor:pointer;
margin-top:10px;
}

.modal{
display:none;position:fixed;
inset:0;background:rgba(0,0,0,.6);
align-items:center;justify-content:center;
}
.modal-content{
background:#fff;padding:20px;border-radius:15px;
width:90%;max-width:400px;
}

#uploadBox{
padding:20px;border:2px dashed #0077be;
border-radius:12px;text-align:center;cursor:pointer;
margin-top:10px;
}
#preview{width:100%;margin-top:10px;border-radius:10px;display:none}

/* رسائل */
.form-message{
margin-top:10px;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
}
.success{background:#e6f7ec;color:#146c2e}
.error{background:#fdecec;color:#b42318}

/* تقييم */
.rating{
display:flex;justify-content:center;
gap:10px;font-size:25px;cursor:pointer;
}
.rating span.active{color:gold}

.survey-form{
max-width:500px;margin:40px auto;
background:#fff;padding:20px;border-radius:15px;
display:flex;flex-direction:column;gap:10px;
}

#footer{
background:#0b3c5d;color:#fff;
text-align:center;padding:30px;
}
</style>
</head>

<body>

<nav class="navbar">
<h2>عدن</h2>
<ul>
<li><a href="#exp">شارك تجربتك</a></li>
<li><a href="#survey">استبيان</a></li>
</ul>
</nav>

<section class="hero">
<div class="hero-overlay">
<h1>اكتشف سحر عدن</h1>
<a href="#exp" class="btn-primary">ابدأ</a>
</div>
</section>

<section id="exp" class="section">
<h2 class="section-title">شارك تجربتك</h2>
<button class="primary-btn" id="openBtn">إضافة تجربة</button>
<div id="gallery" class="gallery"></div>
</section>

<div id="modal" class="modal">
<div class="modal-content">
<h3>شاركنا تجربتك</h3>

<form id="form">
<input id="name" placeholder="اسمك" required>
<input id="place" placeholder="المكان" required>

<div id="uploadBox">اضغط لاختيار صورة</div>
<input type="file" id="file" hidden>
<img id="preview">

<textarea id="comment" placeholder="تعليقك" required></textarea>

<button type="submit" class="primary-btn">نشر</button>
<div id="expMsg" class="form-message"></div>
</form>

</div>
</div>

<!-- استبيان -->
<section id="survey">
<form id="surveyForm" class="survey-form">

<input name="name" placeholder="اسمك" required>

<div class="rating">
<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>
</div>

<input type="hidden" name="rating" id="ratingValue">

<textarea name="msg" placeholder="رأيك" required></textarea>

<button class="primary-btn">إرسال</button>

<div id="surveyMsg" class="form-message"></div>

</form>
</section>

<footer id="footer">
<p>© 2026 سفراء الزمن</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
"https://txqqfiphdsuedwcrvjjs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

const modal=document.getElementById("modal");
const openBtn=document.getElementById("openBtn");
const form=document.getElementById("form");
const fileInput=document.getElementById("file");
const uploadBox=document.getElementById("uploadBox");
const preview=document.getElementById("preview");
const gallery=document.getElementById("gallery");

const expMsg=document.getElementById("expMsg");
const surveyMsg=document.getElementById("surveyMsg");

let imageFile=null;

function showMsg(el,text,type="success"){
el.innerText=text;
el.className="form-message "+type;
el.style.display="block";
setTimeout(()=>el.style.display="none",3000);
}

openBtn.onclick=()=>modal.style.display="flex";
modal.onclick=e=>{if(e.target===modal)modal.style.display="none"};

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
imageFile=fileInput.files[0];
preview.src=URL.createObjectURL(imageFile);
preview.style.display="block";
};

function addCard(n,p,c,img){
gallery.innerHTML+=`
<div class="gallery-card">
<img src="${img}">
<div class="card-content">
<h4>${p}</h4>
<p>${c}</p>
<span>${n}</span>
</div>
</div>`;
}

form.onsubmit=async e=>{
e.preventDefault();

if(!imageFile)return showMsg(expMsg,"ارفع صورة","error");

try{
const fileName=Date.now()+"-"+imageFile.name;

await supabase.storage.from("experiences").upload(fileName,imageFile);

const {data}=supabase.storage.from("experiences").getPublicUrl(fileName);

await supabase.from("experiences").insert([{
user_name:name.value,
place:place.value,
comment:comment.value,
image_url:data.publicUrl
}]);

addCard(name.value,place.value,comment.value,data.publicUrl);

form.reset();
preview.style.display="none";
imageFile=null;
modal.style.display="none";

showMsg(expMsg,"✅ تم نشر تجربتك");

}catch(err){
showMsg(expMsg,"❌ خطأ","error");
}
};

/* تحميل */
(async ()=>{
const {data}=await supabase.from("experiences").select("*");
data?.forEach(i=>addCard(i.user_name,i.place,i.comment,i.image_url));
})();

/* تقييم */
document.querySelectorAll(".rating span").forEach(s=>{
s.onclick=()=>{
document.querySelectorAll(".rating span").forEach(x=>x.classList.remove("active"));
s.classList.add("active");
ratingValue.value=s.dataset.rate;
};
});

/* استبيان */
surveyForm.onsubmit=async e=>{
e.preventDefault();

const res=await fetch("https://formspree.io/f/xaqajwvd",{
method:"POST",
body:new FormData(surveyForm),
headers:{Accept:"application/json"}
});

if(res.ok){
showMsg(surveyMsg,"✅ تم إرسال تقييمك");
surveyForm.reset();
}else{
showMsg(surveyMsg,"❌ فشل الإرسال","error");
}
};
</script>

</body>
</html>
