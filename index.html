<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سفراء الزمن</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Tajawal&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@v1/web/uc-file-uploader-regular.min.css" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#0b5ed7;
      --primary-2:#084298;
      --border:#d8e0ea;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Cairo", "Tajawal", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }

    a{ color:inherit; }

    .navbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.9);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(216,224,234,.8);
    }
    .navbar .nav-inner{
      max-width:1150px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }
    .navbar a{
      text-decoration:none;
      font-weight:800;
      color:var(--primary);
    }
    .navbar a:hover{ color:var(--primary-2); }

    .hero, .section{
      max-width:1150px;
      margin:18px auto;
      padding:24px;
    }

    .hero{
      background:linear-gradient(135deg, #ffffff, #eef4ff);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      text-align:center;
      padding:34px 24px;
    }
    .hero h1{
      margin:0 0 8px;
      font-size:clamp(2rem, 4vw, 3.2rem);
      color:var(--primary-2);
    }
    .hero p{
      margin:0;
      color:var(--muted);
      font-size:1.05rem;
    }

    .section{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .section h2{
      margin:0 0 12px;
      font-size:1.6rem;
      color:var(--primary-2);
    }

    .btn{
      border:0;
      background:var(--primary);
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }
    .btn:hover{ transform:translateY(-1px); background:var(--primary-2); }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:16px;
      margin-top:18px;
    }

    .gallery-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
    }
    .gallery-card img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      background:#eef2f7;
    }
    .card-content{
      padding:14px 16px 16px;
    }
    .card-content h4{
      margin:0 0 8px;
      font-size:1.05rem;
    }
    .card-content p{
      margin:0 0 10px;
      color:#4b5563;
    }
    .card-content span{
      color:var(--muted);
      font-weight:700;
    }

    /* Modal */
    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.58);
      z-index:2000;
      padding:18px;
      align-items:center;
      justify-content:center;
    }
    .modal-content{
      width:min(96vw, 520px);
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:20px;
      position:relative;
      border:1px solid var(--border);
    }
    .close-btn{
      position:absolute;
      top:12px;
      left:14px;
      border:0;
      background:transparent;
      font-size:28px;
      cursor:pointer;
      line-height:1;
      color:#111827;
    }

    form{
      margin-top:10px;
    }
    form input,
    form textarea{
      width:100%;
      display:block;
      margin-top:12px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      font:inherit;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    form textarea{
      min-height:120px;
      resize:vertical;
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.95rem;
    }

    .uploader-wrap{
      margin-top:12px;
      padding:12px;
      border:1px dashed #b9c7d8;
      border-radius:14px;
      background:#f8fbff;
    }

    .hidden{
      display:none;
    }

    .survey-form{
      max-width:560px;
    }

    .survey-form button{
      margin-top:12px;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="#home">الرئيسية</a>
    <a href="#experiences">تجارب الزوار</a>
    <a href="#survey">استبيان</a>
  </div>
</nav>

<section id="home" class="hero">
  <h1>اكتشف سحر عدن التاريخية</h1>
  <p>مدينة البحر والتاريخ والحضارة</p>
</section>

<section id="experiences" class="section">
  <h2>تجارب الزوار</h2>
  <p class="hint">ارفع صورة واحدة، ثم اكتب اسمك والمكان والتعليق.</p>
  <button class="btn" onclick="openExperienceModal()">شارك تجربتك</button>

  <div id="gallery" class="grid"></div>
</section>

<div id="experienceModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <button class="close-btn" type="button" onclick="closeExperienceModal()">×</button>

    <h3>مشاركة تجربة</h3>

    <form id="experienceForm" autocomplete="off">
      <input type="text" name="name" placeholder="اسمك" required>
      <input type="text" name="place" placeholder="اسم المكان" required>

      <div class="uploader-wrap">
        <uc-upload-ctx-provider id="uploaderctx" ctx-name="my-uploader"></uc-upload-ctx-provider>
        <uc-config
          ctx-name="my-uploader"
          pubkey="492ad76c8d4cd40b9428"
        ></uc-config>

        <uc-file-uploader-regular
          ctx-name="my-uploader"
        ></uc-file-uploader-regular>

        <input type="hidden" id="imageUrl" name="imageUrl" value="">
      </div>

      <textarea name="comment" placeholder="اكتب تجربتك..." required></textarea>

      <button class="btn" type="submit">نشر التجربة</button>
    </form>

    <p class="hint" id="uploadStateText">اختر صورة ثم انتظر حتى يكتمل الرفع.</p>
  </div>
</div>

<section id="survey" class="section">
  <h2>استبيان</h2>

  <form class="survey-form" action="https://formspree.io/f/xaqajwvd" method="POST">
    <input type="text" name="name" placeholder="اسمك">
    <textarea name="feedback" placeholder="اكتب رأيك..." required></textarea>
    <button class="btn" type="submit">إرسال</button>
  </form>
</section>

<script type="module">
  import * as UC from "https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@v1/web/file-uploader.min.js";
  UC.defineComponents(UC);

  const ctx = document.querySelector("#uploaderctx");
  const imageUrlInput = document.getElementById("imageUrl");
  const uploadStateText = document.getElementById("uploadStateText");

  ctx.addEventListener("file-upload-start", () => {
    uploadStateText.textContent = "جاري رفع الصورة...";
  });

  ctx.addEventListener("file-upload-success", (e) => {
    const item = e.detail;
    imageUrlInput.value = item.cdnUrl || "";
    uploadStateText.textContent = "تم رفع الصورة بنجاح.";
  });

  ctx.addEventListener("file-upload-failed", () => {
    imageUrlInput.value = "";
    uploadStateText.textContent = "فشل رفع الصورة. جرّب صورة أخرى.";
  });

  ctx.addEventListener("file-url-changed", (e) => {
    const item = e.detail;
    imageUrlInput.value = item.cdnUrl || "";
  });
</script>

<script>
  const FORMSPREE_URL = "https://formspree.io/f/xaqajwvd";
  const form = document.getElementById("experienceForm");
  const modal = document.getElementById("experienceModal");
  const gallery = document.getElementById("gallery");

  function openExperienceModal(){
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden", "false");
  }

  function closeExperienceModal(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden", "true");
  }

  document.querySelectorAll("a[href^='#']").forEach(link => {
    link.addEventListener("click", e => {
      const target = document.querySelector(link.getAttribute("href"));
      if (!target) return;
      e.preventDefault();
      target.scrollIntoView({ behavior: "smooth" });
    });
  });

  modal.addEventListener("click", (e) => {
    if (e.target === modal) closeExperienceModal();
  });

  function addExperienceToUI(name, place, comment, image){
    const card = document.createElement("div");
    card.className = "gallery-card";

    card.innerHTML = `
      <img src="${image}" alt="${place}">
      <div class="card-content">
        <h4>${place}</h4>
        <p>${comment}</p>
        <span>— ${name}</span>
      </div>
    `;

    gallery.prepend(card);
  }

  form.addEventListener("submit", async function(e){
    e.preventDefault();

    const name = form.name.value.trim();
    const place = form.place.value.trim();
    const comment = form.comment.value.trim();
    const imageUrl = document.getElementById("imageUrl").value.trim();

    if (!name || !place || !comment) {
      alert("أكمل الحقول المطلوبة.");
      return;
    }

    if (!imageUrl || !imageUrl.startsWith("https")) {
      alert("اختر صورة وانتظر حتى يكتمل الرفع.");
      return;
    }

    try {
      const emailRes = await fetch(FORMSPREE_URL, {
        method: "POST",
        headers: { "Accept": "application/json" },
        body: new URLSearchParams({
          name,
          place,
          comment,
          image: imageUrl
        })
      });

      if (!emailRes.ok) {
        alert("تم رفع الصورة لكن فشل إرسال البيانات.");
        return;
      }

      addExperienceToUI(name, place, comment, imageUrl);
      alert("تم نشر التجربة بنجاح ✅");
      form.reset();
      document.getElementById("imageUrl").value = "";
      document.getElementById("uploadStateText").textContent = "اختر صورة ثم انتظر حتى يكتمل الرفع.";
      closeExperienceModal();

    } catch (err) {
      console.error(err);
      alert("حدث خطأ أثناء الإرسال.");
    }
  });
</script>

</body>
    </html>
